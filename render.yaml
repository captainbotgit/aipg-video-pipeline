services:
  - type: web
    name: aipg-video-pipeline
    runtime: docker
    plan: standard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3100"
    healthCheckPath: /health
    disk:
      name: video-output
      mountPath: /app/out
      sizeGB: 10
